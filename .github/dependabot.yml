# Weekly checks, but grouped so the noise stays at two PRs at most: Electron on
# its own (its patch releases carry Chromium security fixes and should not wait
# for a batch), everything else as one batch PR.
#
# NOTE: a PR that bumps `electron` only updates package.json — the pinned
# `electronVersion` in apps/desktop/electron-builder.yml must be bumped by hand
# in the same merge, or releases would bundle the old runtime.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Majors on the toolchain are real migrations, not bumps, so they must be
    # done by hand in a dedicated branch, not swept into the weekly batch:
    # TypeScript 7 (Go port, baseUrl removed), Vite 8 / electron-vite 5 /
    # @vitejs/plugin-react 6 (new plugin overloads), @types/node 26
    # (TransferListItem gone), vitest 4 (vi.fn() mock typing breaks test
    # doubles), jsdom majors, react-router-dom 7 (new router API).
    ignore:
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
      - dependency-name: vite
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: vitest
        update-types: ["version-update:semver-major"]
      - dependency-name: electron-vite
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: jsdom
        update-types: ["version-update:semver-major"]
      - dependency-name: react-router-dom
        update-types: ["version-update:semver-major"]
    groups:
      electron:
        patterns:
          - electron
      npm-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - electron

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
