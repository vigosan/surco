# Weekly checks, but grouped so the noise stays at two PRs at most: Electron on
# its own (its patch releases carry Chromium security fixes and should not wait
# for a batch), everything else as one batch PR.
#
# NOTE: a PR that bumps `electron` only updates package.json — the pinned
# `electronVersion` in apps/desktop/electron-builder.yml must be bumped by hand
# in the same merge, or releases would bundle the old runtime.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Majors on the toolchain are real migrations, not bumps, so they must be
    # done by hand in a dedicated branch, not swept into the weekly batch:
    # Vite 8 (blocked until electron-vite ships stable Vite 8 support — v6
    # is still in beta), @vitejs/plugin-react 6 (rolldown-only, requires
    # Vite 8), react-router-dom 7 (new router API). Remove an entry once its
    # migration lands.
    ignore:
      - dependency-name: vite
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: react-router-dom
        update-types: ["version-update:semver-major"]
    groups:
      electron:
        patterns:
          - electron
      npm-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - electron

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
