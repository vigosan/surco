# Weekly checks, but grouped so the noise stays at two PRs at most: Electron on
# its own (its patch releases carry Chromium security fixes and should not wait
# for a batch), everything else as one batch PR.
#
# NOTE: a PR that bumps `electron` only updates package.json — the pinned
# `electronVersion` in apps/desktop/electron-builder.yml must be bumped by hand
# in the same merge, or releases would bundle the old runtime.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # TypeScript 7 (Go port), Vite 8 and @types/node 26 are real migrations
    # (baseUrl removed, TransferListItem gone, new Vite overloads) — they must
    # be done by hand in a dedicated branch, not swept into the weekly batch.
    ignore:
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
      - dependency-name: vite
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      electron:
        patterns:
          - electron
      npm-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - electron

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
