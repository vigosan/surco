name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # The same gate CI runs on every push, repeated here because the tag push and the
  # branch push race as independent workflows: a red CI never stopped the binaries
  # from shipping (v0.46.0 built while its CI run was failing). Nothing downstream —
  # not even the draft release — starts until the suite is green on the tagged tree.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Lockfile-pinned install with retries, same as ci.yml (ffmpeg-static's
      # postinstall download intermittently 504s).
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $attempt), retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Lint desktop
        run: npm run lint -w apps/desktop

      - name: Lint web
        run: npm run lint -w apps/web

      - name: Type-check desktop
        run: npx tsc --build
        working-directory: apps/desktop

      - name: Build web
        run: npm run build -w apps/web

      - name: Test
        run: npm test

  # The matrix jobs used to race electron-builder's find-or-create of the GitHub
  # release: when two finished the lookup at the same instant, each created its own
  # release on the tag and the assets split across duplicates (happened on v0.11.0)
  # — /releases/latest then served a release missing one platform, so the website's
  # download button disabled itself and mac auto-update lost latest-mac.yml.
  # Creating the tag AND the release once, before any builder starts, removes the
  # race: every job finds the release already there and only uploads.
  #
  # The release is created as a DRAFT and only published (publish job, after verify)
  # once every asset — including the merged latest-mac.yml — is in place. A draft is
  # invisible to /releases/latest and to electron-updater's feed, so the slowest arch
  # (Intel) can keep building without users seeing v0.27.0 and hitting a 404 on a
  # latest-mac.yml that the merge job hasn't uploaded yet. electron-builder still
  # reuses the existing release across the matrix jobs: its publisher returns any
  # draft it finds for the tag (`if (release.draft) return release`), so the
  # anti-race guarantee above holds — a draft bound to the tag is reused, not
  # duplicated.
  prepare:
    needs: check
    runs-on: ubuntu-latest
    steps:
      # The git tag lives in this source repo, not in surco-releases. Create the tag
      # there first, pointing at the releases repo's default branch HEAD, so the
      # release has a valid tag to bind to.
      - name: Create the tag and the draft release in the releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          branch=$(gh api repos/surco-app/surco-releases --jq .default_branch)
          sha=$(gh api "repos/surco-app/surco-releases/git/refs/heads/$branch" --jq .object.sha)
          gh api repos/surco-app/surco-releases/git/refs \
            -f ref="refs/tags/$GITHUB_REF_NAME" -f sha="$sha" \
            || echo "tag already exists in the releases repo"
          gh release view "$GITHUB_REF_NAME" --repo surco-app/surco-releases >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo surco-app/surco-releases \
                 --draft --title "${GITHUB_REF_NAME#v}" --notes ""

  release:
    needs: prepare
    strategy:
      # A transient install hiccup on one runner (e.g. ffmpeg-static's binary
      # download getting a 504 from GitHub) shouldn't cancel the other arches'
      # otherwise-healthy builds.
      fail-fast: false
      matrix:
        # macos-14 = Apple Silicon (arm64), macos-15-intel = Intel (x64). Each
        # runner installs ffmpeg/ffprobe natively for its arch, so its .dmg bundles
        # the matching binary — no cross-arch fetching. Windows and Linux stay
        # x64-only. (macos-13 was the old Intel image; GitHub retired it in Dec 2025.
        # The macos-15-intel label is the last x86_64 runner, available until Aug 2027.)
        os: [macos-14, macos-15-intel, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Lockfile-pinned install: the shipped binaries must build from the exact
      # committed dependency tree, not whatever the registry resolves on release
      # day. The root package.json pins every platform's rollup binary into the
      # lock (npm/cli#4828 would otherwise skip them cross-OS).
      # ffmpeg-static's postinstall downloads its binary from GitHub Releases,
      # which intermittently 504s. Retry the whole install a few times so a single
      # transient network failure doesn't kill the release.
      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $attempt), retrying in 15s..."
            sleep 15
          done
          exit 1

      # Read the pinned Electron version so the cache key invalidates on a bump.
      - name: Resolve Electron version
        id: electron
        shell: bash
        run: echo "version=$(node -p "require('electron/package.json').version")" >> "$GITHUB_OUTPUT"

      # Cache the downloaded Electron binary (~100 MB per platform) so the fetch below is a
      # no-op on a hit — the version is in the key, so a bump misses and re-downloads. Keyed by
      # OS + arch because the binary differs per platform. GitHub stores this automatically; no
      # manual upload. On a miss it just downloads as before.
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/.cache/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ steps.electron.outputs.version }}

      # Electron 42+ no longer downloads its binary during npm install (the postinstall was
      # dropped), so fetch it explicitly before electron-builder packages the app — otherwise
      # the pack step finds no Electron binary to bundle. A cache hit above makes this instant.
      - name: Fetch Electron binary
        shell: bash
        run: node node_modules/electron/install.js

      # The App Store Connect API key arrives base64-encoded as a secret; notarize
      # needs it as a file on disk.
      - name: Write Apple API key
        if: runner.os == 'macOS'
        shell: bash
        run: echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/apple-api-key.p8"

      # electron-builder publishes a LIVE release bound to its tag (releaseType:
      # release); the prepare job already created it, so every matrix job finds
      # the same one and only uploads its assets.
      - name: Build & publish (macOS)
        if: runner.os == 'macOS'
        working-directory: apps/desktop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/apple-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        # Apple's timestamp and notarization servers fail intermittently — a signed
        # binary gets "A timestamp was expected but was not found", or notarization
        # times out — and it has taken down whole releases (v0.60.2, v0.60.3) even
        # though the code was fine. electron-builder is idempotent against the release
        # it publishes to, so retry the mac build a few times with backoff. A retry only
        # fires on a transient signing/notarization/network signature; a real, repeatable
        # failure (bad cert, code error) still fails on the first pass and stops, so this
        # never masks a genuine break — it just rides out Apple's flakiness.
        run: |
          npx electron-vite build
          transient='timestamp was expected|notariz|Unable to (?:process|upload)|Could not (?:connect|resolve)|timed out|timeout|502 Bad Gateway|503 Service|connection reset|network error|EAI_AGAIN|ETIMEDOUT|ECONNRESET'
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::electron-builder --mac (attempt $i/$attempts)"
            if npx electron-builder --mac --publish always 2>&1 | tee builder.log; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$i" -eq "$attempts" ]; then
              echo "::error::mac build failed after $attempts attempts"
              exit 1
            fi
            if ! grep -qEi "$transient" builder.log; then
              echo "::error::mac build failed with a non-transient error — not retrying"
              exit 1
            fi
            backoff=$((i * 30))
            echo "Transient signing/notarization failure — retrying in ${backoff}s"
            sleep "$backoff"
          done

      # Both macOS runners publish a file literally named latest-mac.yml, so on the
      # shared release the second upload clobbers the first and one arch loses its
      # update feed. Stash each arch's copy so a later job can merge them.
      - name: Stash the per-arch update feed
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: latest-mac-${{ matrix.os }}
          path: apps/desktop/dist/latest-mac.yml

      - name: Build & publish (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/desktop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          npx electron-vite build
          npx electron-builder --win --publish always

      # No signing or notarization step: Linux has no equivalent gatekeeper, so the
      # AppImage ships as-is. electron-builder emits latest-linux.yml alongside it,
      # and unlike the two macOS runners there is only one Linux arch, so nothing
      # clobbers that feed — no stash-and-merge needed here.
      - name: Build & publish (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/desktop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          npx electron-vite build
          npx electron-builder --linux --publish always

  # The arm64 and x64 runners each uploaded a single-arch latest-mac.yml and the
  # last one won. Rebuild one feed that lists BOTH arch zips so electron-updater
  # serves each Mac the matching build, then overwrite the clobbered copy.
  merge-mac-feed:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: latest-mac-*
          path: feeds
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Merge the two feeds into one
        run: |
          npm init -y >/dev/null 2>&1
          npm i js-yaml@4 >/dev/null 2>&1
          node - <<'EOF'
          const fs = require('fs')
          const yaml = require('js-yaml')
          const feeds = fs
            .readdirSync('feeds')
            .map((d) => yaml.load(fs.readFileSync(`feeds/${d}/latest-mac.yml`, 'utf8')))
          // Keep the arm64 feed as the base (its top-level path stays the legacy
          // default) and splice in the x64 file entries electron-updater matches by arch.
          const base = feeds.find((f) => f.files.some((x) => x.url.includes('arm64'))) || feeds[0]
          const seen = new Set(base.files.map((f) => f.url))
          for (const f of feeds)
            for (const file of f.files)
              if (!seen.has(file.url)) {
                base.files.push(file)
                seen.add(file.url)
              }
          fs.writeFileSync('latest-mac.yml', yaml.dump(base, { lineWidth: -1 }))
          console.log(fs.readFileSync('latest-mac.yml', 'utf8'))
          EOF
      - name: Overwrite the feed on the release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" latest-mac.yml --clobber --repo surco-app/surco-releases

  # The per-release test for the publish pipeline: a release is only good when its
  # tag carries exactly ONE release with the full asset set. A duplicate release
  # (the race above) or a missing installer turns this run red immediately,
  # instead of surfacing days later as a dead download button on the website.
  verify:
    needs: [release, merge-mac-feed]
    runs-on: ubuntu-latest
    steps:
      - name: Assert one release with the full asset set
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          # --slurp (not --jq) so the filter sees ONE array of every page: with
          # --paginate + --jq, gh runs the filter PER PAGE and concatenates the
          # results, so a second (empty) page made count "1\n0" and the check
          # failed on a release that was in fact complete.
          count=$(gh api repos/surco-app/surco-releases/releases --paginate --slurp \
            | jq "[.[][] | select(.tag_name == \"$GITHUB_REF_NAME\")] | length")
          [ "$count" = "1" ] || { echo "expected 1 release for $GITHUB_REF_NAME, found $count"; exit 1; }
          names=$(gh release view "$GITHUB_REF_NAME" --repo surco-app/surco-releases \
            --json assets --jq '.assets[].name')
          status=0
          # The AppImage is x86_64, not x64: electron-builder renames the x64 arch to
          # x86_64 for AppImage/rpm/flatpak (amd64 for deb) — see getArtifactArchName
          # in builder-util. The .dmg/.zip keep x64, hence the two spellings here.
          # AppImage ships no .blockmap (no differential download), so none is listed.
          for asset in \
            "Surco-$version-arm64.dmg" "Surco-$version-arm64.dmg.blockmap" \
            "Surco-$version-arm64.zip" "Surco-$version-arm64.zip.blockmap" \
            "Surco-$version-x64.dmg" "Surco-$version-x64.dmg.blockmap" \
            "Surco-$version-x64.zip" "Surco-$version-x64.zip.blockmap" \
            "Surco-$version-Setup.exe" "Surco-$version-Setup.exe.blockmap" \
            "Surco-$version-x86_64.AppImage" \
            latest-mac.yml latest.yml latest-linux.yml; do
            echo "$names" | grep -qxF "$asset" || { echo "missing asset: $asset"; status=1; }
          done
          exit $status

  # Flip the draft to a published release ONLY after verify confirms the full asset
  # set is present. This is the moment the release becomes visible to
  # /releases/latest and to electron-updater — so by construction no user can see
  # v0.27.0 before latest-mac.yml (and every installer) is already there.
  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --repo surco-app/surco-releases --draft=false

  # Point the Homebrew tap at the freshly published version so `brew install` of a
  # clean machine grabs a current build. Existing installs ignore this — they
  # self-update via electron-updater (the cask is auto_updates true), so this only
  # matters for first-time installs, hence it's a best-effort tail job. It waits
  # for publish so the cask only ever points at a live, fully-uploaded release.
  update-tap:
    needs: [release, merge-mac-feed, verify, publish]
    runs-on: ubuntu-latest
    steps:
      # GitHub computes a sha256 for every release asset, so read those instead of
      # re-downloading ~300 MB of dmg just to hash it.
      - name: Read the published dmg checksums
        id: dmg
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          digest() {
            gh release view "$GITHUB_REF_NAME" --repo surco-app/surco-releases \
              --json assets --jq ".assets[] | select(.name == \"$1\") | .digest" \
              | sed 's/^sha256://'
          }
          arm="$(digest "Surco-$version-arm64.dmg")"
          intel="$(digest "Surco-$version-x64.dmg")"
          # Fail loud rather than push a cask with empty checksums that breaks install.
          [ -n "$arm" ] && [ -n "$intel" ] || { echo "missing dmg digest"; exit 1; }
          {
            echo "version=$version"
            echo "arm=$arm"
            echo "intel=$intel"
          } >> "$GITHUB_OUTPUT"

      - name: Check out the tap
        uses: actions/checkout@v4
        with:
          repository: surco-app/homebrew-surco
          # Dedicated deploy key, write-scoped to homebrew-surco only, so the push
          # doesn't depend on RELEASES_TOKEN's scope. checkout wires the remote to
          # SSH, so the later `git push` authenticates with this key.
          ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}

      - name: Bump the cask
        env:
          V: ${{ steps.dmg.outputs.version }}
          ARM: ${{ steps.dmg.outputs.arm }}
          INTEL: ${{ steps.dmg.outputs.intel }}
        run: |
          cask=Casks/surco.rb
          sed -i -E "s/  version \"[^\"]+\"/  version \"$V\"/" "$cask"
          sed -i -E "s/(arm:   )\"[0-9a-f]{64}\"/\1\"$ARM\"/" "$cask"
          sed -i -E "s/(intel: )\"[0-9a-f]{64}\"/\1\"$INTEL\"/" "$cask"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -aqm "Update surco cask to v$V" || { echo "cask already current"; exit 0; }
          git push
