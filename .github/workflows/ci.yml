name: CI

# The release workflow only bundles and ships; nothing gated lint, type-checks or
# tests, so regressions (e.g. a broken tsc build) could land on main unseen. This runs
# the checks on every push and PR.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      # Lockfile-pinned install: the root package.json pins every platform's rollup
      # binary into the lock (npm/cli#4828 would otherwise skip them cross-OS), so the
      # build uses the exact committed dependency tree instead of resolving fresh from
      # the registry. ffmpeg-static's postinstall download from GitHub Releases
      # intermittently 504s, so retry the install a few times.
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $attempt), retrying in 15s..."
            sleep 15
          done
          exit 1

      - name: Lint desktop
        run: npm run lint -w apps/desktop

      - name: Lint web
        run: npm run lint -w apps/web

      - name: Type-check desktop
        run: npx tsc --build
        working-directory: apps/desktop

      # The web build runs `tsc --noEmit` and then the SSG render, so it gates both
      # type errors and pages that throw at prerender time.
      - name: Build web
        run: npm run build -w apps/web

      - name: Test
        run: npm test
