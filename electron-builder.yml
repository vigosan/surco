appId: com.vigosan.rotulo
productName: Rótulo
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/ffprobe-static/**
mac:
  category: public.app-category.music
  target:
    - dmg
  artifactName: ${productName}-${version}.${ext}
