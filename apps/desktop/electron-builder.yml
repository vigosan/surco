appId: com.vigosan.surco
productName: Surco
# npm workspaces hoist electron to the repo-root node_modules, so electron-builder
# run from apps/desktop can't infer the version — pin it explicitly. Keep in sync
# with the electron devDependency.
electronVersion: 43.1.1
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
  # The drag-out icon and the dock icon are loaded at runtime from build/icon.png via
  # app.getAppPath(); buildResources isn't bundled into the app, so without this the
  # path is empty and startDrag (which rejects an empty icon) throws — dragging a track
  # row out silently does nothing in packaged builds.
  - build/icon.png
asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/@ffprobe-installer/**
# Registers Surco as a handler for the formats it opens so Finder lists "Open With
# Surco" (these become CFBundleDocumentTypes on macOS). rank Alternate: Surco offers to
# open them but never claims the default away from Music/Audacity — it just joins the
# menu. The extensions mirror the AUDIO_EXTS the main process accepts (src/main/expand.ts).
#
# One entry per extension, `ext` a plain string rather than the list of extensions this
# used to be. The list form is valid for mac and NSIS, but AppImage hands this config to
# a Go binary whose FileAssociation.Ext is typed as a string, so a list aborts the Linux
# build outright ("expects \" or n, but found ["). Platform blocks can't fix it either:
# platformPackager CONCATENATES the global list with the platform one, so linux couldn't
# opt out. Flattening satisfies all three packagers with the same associations.
fileAssociations:
  - ext: wav
    name: Audio
    role: Editor
    rank: Alternate
  - ext: flac
    name: Audio
    role: Editor
    rank: Alternate
  - ext: aif
    name: Audio
    role: Editor
    rank: Alternate
  - ext: aiff
    name: Audio
    role: Editor
    rank: Alternate
  - ext: mp3
    name: Audio
    role: Editor
    rank: Alternate
  - ext: m4a
    name: Audio
    role: Editor
    rank: Alternate
  - ext: mp4
    name: Audio
    role: Editor
    rank: Alternate
  - ext: aac
    name: Audio
    role: Editor
    rank: Alternate
  - ext: ogg
    name: Audio
    role: Editor
    rank: Alternate
  - ext: oga
    name: Audio
    role: Editor
    rank: Alternate
  - ext: opus
    name: Audio
    role: Editor
    rank: Alternate
afterPack: build/afterPack.cjs
mac:
  category: public.app-category.music
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extendInfo:
    CFBundleDisplayName: Surco
  # zip alongside dmg: Squirrel.Mac (electron-updater) updates from the zip, not
  # the dmg, so omitting it would ship installs that can't auto-update.
  target:
    - dmg
    - zip
  # Arch in the name so the arm64 and x64 builds (each from its own native runner)
  # don't collide as the same asset on the shared GitHub release.
  artifactName: ${productName}-${version}-${arch}.${ext}
win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  icon: build/icon.png
  category: AudioVideo
  # AppImage only. It is the one Linux target electron-updater can update in place,
  # so a .deb/.rpm install would strand its users on the version they downloaded —
  # every release would be a manual re-download. One self-contained file also dodges
  # the distro matrix entirely: no packaging per Debian/Fedora/Arch.
  #
  # Build this on Linux (CI uses ubuntu-latest), never cross-built from a Mac. Both
  # ffmpeg-static and @ffprobe-installer pick their binary from os.platform()/os.arch()
  # at INSTALL time, so a `npm ci` on macOS leaves Mach-O binaries in node_modules and
  # electron-builder happily packs those into the AppImage. The result launches on Linux
  # and then fails every conversion — the one thing the app exists to do. A local
  # `electron-builder --linux` is therefore only good for checking that it packages,
  # never for testing that it runs.
  target:
    - AppImage
  # Arch in the name to match the mac assets, and because a future arm64 Linux build
  # would otherwise collide with this one as the same asset on the shared release.
  artifactName: ${productName}-${version}-${arch}.${ext}
publish:
  provider: github
  owner: surco-app
  # Source stays in the private repo; binaries and the update feed go to a public
  # repo so the web button and electron-updater can reach them without a token.
  repo: surco-releases
  # Publish live, not draft. A published release is bound to its tag, so the three
  # parallel matrix jobs all reuse the same release; a draft isn't tag-bound, so each
  # job would race to create its own duplicate draft and split the assets across them.
  # GitHub rejects a published release whose tag doesn't exist in this binaries-only
  # repo (422 "must have a valid tag"), so the workflow pre-creates the tag here first.
  releaseType: release
