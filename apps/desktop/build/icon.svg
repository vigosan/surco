<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.32" cy="0.24" r="1.0">
      <stop offset="0" stop-color="#2A2E42"/>
      <stop offset="0.55" stop-color="#1A1B26"/>
      <stop offset="1" stop-color="#14141C"/>
    </radialGradient>
    <radialGradient id="disc" cx="0.42" cy="0.36" r="0.8">
      <stop offset="0" stop-color="#262A3A"/>
      <stop offset="0.5" stop-color="#141620"/>
      <stop offset="1" stop-color="#07080C"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5A6079"/>
      <stop offset="0.5" stop-color="#23263250"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="label" cx="0.4" cy="0.34" r="0.85">
      <stop offset="0" stop-color="#9CC0FF"/>
      <stop offset="0.6" stop-color="#7AA2F7"/>
      <stop offset="1" stop-color="#5D7FD6"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="discClip"><circle cx="512" cy="512" r="372"/></clipPath>
    <filter id="discShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="labelGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#7AA2F7" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g filter="url(#discShadow)">
    <circle cx="512" cy="512" r="378" fill="url(#rim)"/>
    <circle cx="512" cy="512" r="372" fill="url(#disc)"/>
    <g clip-path="url(#discClip)">
      <g fill="none" stroke="#FFFFFF" stroke-opacity="0.06">
        <circle cx="512" cy="512" r="352" stroke-width="3"/>
        <circle cx="512" cy="512" r="332" stroke-width="3"/>
        <circle cx="512" cy="512" r="312" stroke-width="3"/>
        <circle cx="512" cy="512" r="292" stroke-width="3"/>
        <circle cx="512" cy="512" r="272" stroke-width="3"/>
        <circle cx="512" cy="512" r="252" stroke-width="3"/>
        <circle cx="512" cy="512" r="232" stroke-width="3"/>
        <circle cx="512" cy="512" r="212" stroke-width="3"/>
        <circle cx="512" cy="512" r="192" stroke-width="3"/>
      </g>
      <g fill="none" stroke="#7AA2F7" stroke-opacity="0.18">
        <circle cx="512" cy="512" r="342" stroke-width="2"/>
        <circle cx="512" cy="512" r="262" stroke-width="2"/>
      </g>
      <rect x="150" y="150" width="724" height="724" fill="url(#sheen)"/>
    </g>
    <circle cx="512" cy="512" r="150" fill="url(#label)" filter="url(#labelGlow)"/>
    <circle cx="512" cy="512" r="12" fill="#0B1430"/>
  </g>

  <text x="512" y="438" font-family="Marker Felt" font-weight="bold" font-size="150"
        fill="#0B1430" text-anchor="middle" dominant-baseline="central">S</text>
</svg>
